        }

        function saveBrandNotes(brand) {
            const bi = getBrandInfo();
            if (!bi[brand]) bi[brand] = { address: '', notes: '' };
            const el = document.getElementById('brandNotes_' + brand.replace(/[^a-zA-Z\u4e00-\u9fa5]/g, '_'));
            if (el) bi[brand].notes = el.value;
            saveBrandInfo(bi);
        }

        function saveBrandAddr(brand, value) {
            const bi = getBrandInfo();
            if (!bi[brand]) bi[brand] = { address: '', notes: '' };
            bi[brand].address = value;
            saveBrandInfo(bi);
            const displayEl = document.getElementById('brandAddrDisplay_' + brand.replace(/[^a-zA-Z\u4e00-\u9fa5]/g, '_'));
            if (displayEl) displayEl.textContent = value || '未填写';
            updateSpeechFromSelection();
        }

        function copyBrandAddress(brand) {
            const bi = getBrandInfo();
            const addr = (bi[brand] && bi[brand].address) ? bi[brand].address : '';
            if (!addr) { alert('该品牌未填写寄回地址'); return; }
            navigator.clipboard.writeText(addr).then(function() { alert('✅ 地址已复制'); }).catch(function() { alert(
                '复制失败'); });
        }

        // ============ SCREENSHOT REMINDER ============
        function updateScreenshotReminder() {
            const el = document.getElementById('screenshotReminder');
            const today = getToday();
            const lastDayOfMonth = new Date(today.getFullYear(), today.getMonth() + 1, 0);
            const daysLeft = Math.floor((lastDayOfMonth - today) / (1000 * 60 * 60 * 24)) + 1;
            if (daysLeft > 5 || daysLeft < 0) { el.classList.remove('show'); return; }
            const records = getRecords();
            const monthStr = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0');
            const published = records.filter(function(r) {
                const pd = getPublishDate(r);
                if (!pd) return false;
                const p = new Date(pd);
                p.setHours(0, 0, 0, 0);
                if (p > today) return false;
                return pd.startsWith(monthStr);
            });
            if (published.length === 0) { el.classList.remove('show'); return; }
            const brandCounts = {};
            published.forEach(function(r) { brandCounts[r.brand] = (brandCounts[r.brand] || 0) + 1; });
            let detailStr = Object.entries(brandCounts).map(function(e) { return e[0] + '：' + e[1] + '条'; }).join(' · ');
            el.innerHTML = '📸 <strong>本月截图提醒</strong>（' + monthStr + '） — 已发布 <strong>' + published.length +
                '</strong> 条 | ' + detailStr + ' | 请于月底前完成截图';
            el.classList.add('show');
        }

        // ============ BACKUP / RESTORE ============
        function backupData() {
            const data = { records: getRecords(), brandInfo: getBrandInfo(), exportedAt: new Date().toISOString() };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = '达人管理_备份_' + new Date().toISOString().split('T')[0] + '.json';
            a.click();
            URL.revokeObjectURL(url);
            alert('✅ 备份完成！文件已下载。');
        }

        function restoreData() { document.getElementById('restoreFileInput').click(); }

        function handleRestore(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                try {
                    const data = JSON.parse(ev.target.result);
                    if (data.records && Array.isArray(data.records)) {
                        saveRecords(data.records);
                        if (data.brandInfo) saveBrandInfo(data.brandInfo);
                        alert('✅ 恢复成功！共恢复 ' + data.records.length + ' 条记录');
                        location.reload();
                    } else { alert('文件格式不正确'); }
                } catch (e) { alert('文件解析失败，请确认是备份文件'); }
            };
            reader.readAsText(file, 'UTF-8');
            event.target.value = '';
        }

        // ============ CSV ============
        function exportRecordToRow(r) {
            const tl = r.timeline || {};
            return [r.nickname, r.platform, r.creatorType, r.brand, r.followers || '', r.execPrice || '', r.profileUrl || '',
                r.publishDate || '', (tl.outline || {}).date || '', (tl.outline || {}).done ? '是' : '否', (tl.script ||
                    {}).date || '', (tl.script || {}).done ? '是' : '否', (tl.draft || {}).date || '', (tl.draft || {})
                .done ? '是' : '否', (tl.videoDraft || {}).date || '', (tl.videoDraft || {}).done ? '是' : '否', (tl
                    .publish || {}).date || '', (tl.publish || {}).done ? '是' : '否', r.sentOut || '否', r.sentBack ||
                '否', r.trackingNumber || '', r.materialReceived || '否', r.coopStatus || '正常合作', r.notes || '',
                r.isDirect ? '是' : '否', r.pauseStart || '', r.pauseEnd || ''
            ];
        }

        function downloadCSV(rows, filename) {
            const BOM = '\uFEFF',
                csv = BOM + rows.map(function(r) { return r.map(function(c) { return '"' + c + '"'; }).join(','); }).join(
                    '\n');
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' }),
                url = URL.createObjectURL(blob),
                a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }

        function exportCSV() {
            const records = getRecords();
            if (records.length === 0) { alert('没有数据可导出'); return; }
            const headers = ['昵称', '平台', '类型', '品牌', '粉丝量', '执行价', '主页链接', '发布档期', '大纲', '大纲完成', '脚本', '脚本完成',
                '图文初稿', '图文初稿完成', '视频初稿', '视频初稿完成', '发布时间', '发布时间完成', '寄出', '寄回', '单号', '素材', '合作状态', '备注',
                '直发达人', '暂停开始', '暂停结束'
            ];
            downloadCSV([headers, ...records.map(function(r) { return exportRecordToRow(r); })],
                '达人执行进度_' + new Date().toISOString().split('T')[0] + '.csv');
        }

        function importCSV() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.csv';
            input.onchange = function(e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function(ev) {
                    const text = ev.target.result,
                        lines = text.split('\n').filter(function(l) { return l.trim(); });
                    if (lines.length < 2) { alert('CSV文件为空'); return; }

                    function parseCSVLine(line) {
                        const result = [];
                        let current = '',
                            inQuotes = false;
                        for (let i = 0; i < line.length; i++) { const ch = line[i]; if (ch === '"')
                                inQuotes = !inQuotes; else if (ch === ',' && !inQuotes) { result.push(
                                    current.trim());
                                current = ''; } else current += ch; }
                        result.push(current.trim());
                        return result;
                    }
                    const newRecords = [];
                    for (let i = 1; i < lines.length; i++) {
                        const values = parseCSVLine(lines[i]);
                        if (values.length < 24) continue;
                        const record = { nickname: values[0] || '', platform: values[1] || '', creatorType: values[
                                2] || '', brand: values[3] || '', followers: values[4] || '', execPrice: values[
                                5] || '', profileUrl: values[6] || '', publishDate: values[7] || '',
                            timeline: {}, sentOut: values[18] || '否', sentBack: values[19] || '否',
                            trackingNumber: values[20] || '', materialReceived: values[21] || '否', coopStatus: values[
                                22] || '正常合作', notes: values[23] || '', isDirect: values[24] === '是',
                            pauseStart: values[25] || '', pauseEnd: values[26] || '', createdAt: new Date()
                                .toISOString() };
                        if (values[8]) record.timeline['outline'] = { date: values[8], done: values[9] === '是' };
                        if (values[10]) record.timeline['script'] = { date: values[10], done: values[11] === '是' };
                        if (values[12]) record.timeline['draft'] = { date: values[12], done: values[13] === '是' };
                        if (values[14]) record.timeline['videoDraft'] = { date: values[14], done: values[15] ===
                                '是' };
                        if (values[16]) record.timeline['publish'] = { date: values[16], done: values[17] === '是' };
                        newRecords.push(record);
                    }
                    if (newRecords.length === 0) { alert('未解析到数据'); return; }
                    const choice = confirm('点"确定"追加到现有数据后面\n点"取消"覆盖现有数据');
                    const records = choice ? [...getRecords(), ...newRecords] : newRecords;
                    saveRecords(records);
                    renderTabs();
                    if (currentTab === 'stats') { buildStatFilters();
                        runStats(); } else renderTable();
                    alert('成功导入 ' + newRecords.length + ' 条记录');
                };
                reader.readAsText(file, 'UTF-8');
            };
            input.click();
        }

        // ============ STATS ============
        function buildStatFilters() {
            const records = getRecords(),
                months = new Set();
            records.forEach(function(r) { const pd = getPublishDate(r); if (pd) months.add(pd.substring(0, 7)); });
            document.getElementById('statMonth').innerHTML = '<option value="">全部月份</option>' + [...months].sort().map(
                function(m) { return '<option value="' + m + '">' + m + '</option>'; }).join('');
            const brands = [...new Set(records.map(function(r) { return r.brand; }))].sort();
            document.getElementById('statBrand').innerHTML = '<option value="">全部品牌</option>' + brands.map(function(b) {
                return '<option value="' + b + '">' + b + '</option>'; }).join('');
        }

        function runStats() {
            const records = getRecords(),
                fm = document.getElementById('statMonth').value,
                fb = document.getElementById('statBrand').value,
                ft = document.getElementById('statType').value,
                fp = document.getElementById('statPlatform').value;
            let filtered = records.filter(function(r) { const pd = getPublishDate(r); if (fm && (!pd || !pd.startsWith(
                    fm))) return false; if (fb && r.brand !== fb) return false; if (ft && r.creatorType !== ft)
                    return false; if (fp && r.platform !== fp) return false; return true; });
            const total = filtered.length,
                dc = filtered.filter(function(r) { return getRecordOverallStatus(r) === 'done'; }).length,
                ac = total - dc;
            const bc = {};
            filtered.forEach(function(r) { bc[r.brand] = (bc[r.brand] || 0) + 1; });
            const tc = {};
            filtered.forEach(function(r) { tc[r.creatorType] = (tc[r.creatorType] || 0) + 1; });
            document.getElementById('statResult').innerHTML =
                '<div class="stat-result-card"><div class="big">' + total +
                '</div><div class="small">筛选结果</div></div><div class="stat-result-card"><div class="big" style="color:#27ae60;">' +
                dc + '</div><div class="small">已完成</div></div><div class="stat-result-card"><div class="big" style="color:#e74c3c;">' +
                ac + '</div><div class="small">进行中</div></div>';
            let dh =
                '<h4 style="margin-bottom:8px;">品牌分布</h4><table class="stat-detail-table"><thead><tr><th>品牌</th><th>数量</th></tr></thead><tbody>';
            Object.entries(bc).sort(function(a, b) { return b[1] - a[1]; }).forEach(function(e) { dh += '<tr><td>' + e[
                    0] + '</td><td>' + e[1] + '</td></tr>'; });
            dh += '</tbody></table>';
            if (Object.keys(tc).length > 0) { dh +=
                '<h4 style="margin:12px 0 8px;">类型分布</h4><table class="stat-detail-table"><thead><tr><th>类型</th><th>数量</th></tr></thead><tbody>';
                Object.entries(tc).sort(function(a, b) { return b[1] - a[1]; }).forEach(function(e) { dh += '<tr><td>' +
                        e[0] + '</td><td>' + e[1] + '</td></tr>'; });
                dh += '</tbody></table>'; }
            document.getElementById('statDetailTable').innerHTML = dh;
        }

        function exportStatCSV() {
            const records = getRecords(),
                fm = document.getElementById('statMonth').value,
                fb = document.getElementById('statBrand').value,
                ft = document.getElementById('statType').value,
                fp = document.getElementById('statPlatform').value;
            let filtered = records.filter(function(r) { const pd = getPublishDate(r); if (fm && (!pd || !pd.startsWith(
                    fm))) return false; if (fb && r.brand !== fb) return false; if (ft && r.creatorType !== ft)
                    return false; if (fp && r.platform !== fp) return false; return true; });
            if (filtered.length === 0) { alert('没有匹配数据'); return; }
            const headers = ['昵称', '平台', '类型', '品牌', '粉丝量', '执行价', '主页链接', '发布档期', '大纲', '大纲完成', '脚本', '脚本完成',
                '图文初稿', '图文初稿完成', '视频初稿', '视频初稿完成', '发布时间', '发布时间完成', '寄出', '寄回', '单号', '素材', '合作状态', '备注'
            ];
            downloadCSV([headers, ...filtered.map(function(r) { return exportRecordToRow(r); })],
                '数据筛查_' + new Date().toISOString().split('T')[0] + '.csv');
        }

        // ============ CRUD ============
        function saveRecord() {
            const nickname = document.getElementById('nickname').value.trim(),
                platform = document.getElementById('platform').value,
                creatorType = document.getElementById('creatorType').value,
                brand = document.getElementById('brand').value.trim();
            const followers = document.getElementById('followers').value.trim(),
                profileUrl = document.getElementById('profileUrl').value.trim(),
                execPrice = document.getElementById('execPrice').value.trim(),
                publishDate = document.getElementById('publishDate').value;
            const coopStatus = document.getElementById('coopStatus').value,
                isDirect = document.getElementById('isDirect').checked;
            const timeline = getTimelineData(),
                sentOut = document.getElementById('sentOut').value,
                sentBack = document.getElementById('sentBack').value;
            const trackingNumber = document.getElementById('trackingNumber').value.trim(),
                materialReceived = document.getElementById('materialReceived').value,
                notes = document.getElementById('notes').value.trim();
            const pauseStart = document.getElementById('pauseStart').value,
                pauseEnd = document.getElementById('pauseEnd').value;
            const editId = document.getElementById('editId').value;
            if (!nickname || !platform || !creatorType || !brand) { alert('请填写所有必填项（带 * 的字段）'); return; }
            const record = { nickname, platform, creatorType, brand, followers, profileUrl, execPrice, publishDate,
                coopStatus, isDirect, timeline, sentOut, sentBack, trackingNumber, materialReceived, notes,
                pauseStart, pauseEnd, createdAt: new Date().toISOString() };
            const records = getRecords();
            if (editId !== '') records[parseInt(editId)] = record;
            else records.push(record);
            saveRecords(records);
            resetForm();
            selectedRecordIndex = -1;
            renderTabs();
            if (currentTab === 'stats') { buildStatFilters();
                runStats(); } else renderTable();
            renderBrandCards();
        }

        function editRecord(index) {
            const records = getRecords(),
                r = records[index];
            document.getElementById('editId').value = index;
            selectedRecordIndex = index;
            fillFormFromRecord(r);
            document.getElementById('btnCancel').hidden = false;
            switchPanelTab('form');
            document.getElementById('leftPanel').scrollIntoView({ behavior: 'smooth' });
            renderTable();
        }

        function cancelEdit() { resetForm();
            selectedRecordIndex = -1;
            renderTable(); }

        function resetForm() {
            document.getElementById('nickname').value = '';
            document.getElementById('platform').value = '';
            document.getElementById('creatorType').value = '';
            document.getElementById('isDirect').checked = false;
            onDirectChange();
            document.getElementById('timelineNodes').innerHTML =
                '<p style="color:#8c9aa8;font-size:11px;">请先选择达人类型</p>';
            document.getElementById('brand').value = '';
            document.getElementById('followers').value = '';
            document.getElementById('profileUrl').value = '';
            document.getElementById('execPrice').value = '';
            document.getElementById('publishDate').value = '';
            document.getElementById('coopStatus').value = '正常合作';
            document.getElementById('pauseStart').value = '';
            document.getElementById('pauseEnd').value = '';
            document.getElementById('pauseDateSection').style.display = 'none';
            document.getElementById('sentOut').value = '否';
            document.getElementById('sentBack').value = '否';
            document.getElementById('trackingNumber').value = '';
            document.getElementById('materialReceived').value = '否';
            document.getElementById('notes').value = '';
            document.getElementById('editId').value = '';
            document.getElementById('btnCancel').hidden = true;
            document.getElementById('expressSection').style.display = '';
            document.getElementById('materialSection').style.display = '';
        }

        function deleteRecord(index) {
            if (!confirm('确定要删除这条记录吗？')) return;
            const records = getRecords();
            records.splice(index, 1);
            saveRecords(records);
            if (selectedRecordIndex === index) selectedRecordIndex = -1;
            renderTabs();
            if (currentTab === 'stats') { buildStatFilters();
                runStats(); } else renderTable();
            renderBrandCards();
        }

        function scrollToForm() {
            switchTab('urgent');
            selectedRecordIndex = -1;
            resetForm();
            switchPanelTab('form');
            document.getElementById('leftPanel').scrollIntoView({ behavior: 'smooth' });
        }

        // ============ INIT ============
        function init() {
            // 日期显示
            updateTodayDisplay();

            // 初始化表单
            updateTimelineForm();

            // 渲染标签和表格
            renderTabs();
            renderTable();
            renderBrandCards();
            updateScreenshotReminder();

            // 面板标签点击事件
            document.getElementById('panelTabForm').addEventListener('click', function() { switchPanelTab('form'); });
            document.getElementById('panelTabSpeech').addEventListener('click', function() { switchPanelTab('speech'); });
            document.getElementById('panelTabBrands').addEventListener('click', function() { switchPanelTab('brands'); });

            // 定时刷新
            setInterval(function() {
                updateTodayDisplay();
                if (currentTab !== 'stats') renderTable();
                updateScreenshotReminder();
            }, 60000);
        }

        init();
    </script>
</body>
</html>
