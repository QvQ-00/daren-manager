<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>达人执行进度管理</title>
    <style>
        :root {
            --blue: #0077BE;
            --light-bg: #E8F4F8;
            --mint: #8BD3C7;
            --mint-dark: #6db5a9;
            --white: #ffffff;
            --text: #1a1a2e;
            --text-light: #5a6a7a;
            --red: #e74c3c;
            --red-bg: #fff0f0;
            --yellow: #f0a500;
            --yellow-bg: #fffdf0;
            --green: #27ae60;
            --green-bg: #f0faf5;
            --gray: #e8ecf1;
            --gray-text: #8c9aa8;
            --radius: 10px;
            --radius-sm: 6px;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
            --font: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: #f5f7fa;
            color: var(--text);
            padding: 18px;
            font-size: 13px;
            line-height: 1.5;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
        }

        .header {
            background: linear-gradient(135deg, #0077BE 0%, #005a8c 100%);
            color: white;
            padding: 20px 24px;
            border-radius: var(--radius);
            margin-bottom: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            box-shadow: 0 4px 20px rgba(0, 119, 190, 0.15);
        }
        .header h1 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .header .subtitle {
            opacity: 0.85;
            font-size: 11px;
            font-weight: 400;
        }
        .header-right {
            font-size: 11px;
            opacity: 0.9;
            font-weight: 500;
        }

        .stats-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: var(--white);
            padding: 12px 18px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            flex: 1;
            min-width: 85px;
            text-align: center;
            transition: transform 0.15s;
            border: 1px solid #eef1f5;
        }
        .stat-card:hover {
            transform: translateY(-1px);
        }
        .stat-card .number {
            font-size: 22px;
            font-weight: 700;
        }
        .stat-card .label {
            font-size: 10px;
            color: var(--text-light);
            margin-top: 2px;
        }
        .stat-card.danger .number {
            color: var(--red);
        }
        .stat-card.warning .number {
            color: var(--yellow);
        }
        .stat-card.total .number {
            color: var(--blue);
        }
        .stat-card.done .number {
            color: var(--green);
        }

        .screenshot-reminder {
            background: #fffdf0;
            border: 1px solid #f0e080;
            border-radius: var(--radius-sm);
            padding: 10px 14px;
            margin-bottom: 12px;
            font-size: 11px;
            color: #856404;
            display: none;
        }
        .screenshot-reminder.show {
            display: block;
        }

        .tabs-nav {
            display: flex;
            gap: 4px;
            margin-bottom: 12px;
            flex-wrap: wrap;
            background: var(--white);
            padding: 5px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid #eef1f5;
        }
        .tab-btn {
            padding: 8px 14px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            background: transparent;
            color: var(--text-light);
            transition: all 0.2s;
            font-family: inherit;
            white-space: nowrap;
        }
        .tab-btn:hover {
            background: var(--light-bg);
            color: var(--blue);
        }
        .tab-btn.active {
            background: var(--blue);
            color: white;
        }
        .tab-btn.urgent-tab {
            color: var(--red);
        }
        .tab-btn.urgent-tab.active {
            background: var(--red);
            color: white;
        }
        .tab-btn.recycle-tab {
            color: #e67e22;
        }
        .tab-btn.recycle-tab.active {
            background: #e67e22;
            color: white;
        }
        .tab-btn.stat-tab {
            color: var(--green);
        }
        .tab-btn.stat-tab.active {
            background: var(--green);
            color: white;
        }
        .brand-count {
            font-size: 9px;
            background: #eef1f5;
            border-radius: 8px;
            padding: 1px 6px;
            margin-left: 3px;
            font-weight: 500;
        }
        .tab-btn.active .brand-count {
            background: rgba(255, 255, 255, 0.3);
        }

        .main-content {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            align-items: flex-start;
        }

        .left-panel {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            flex: 0 0 380px;
            position: sticky;
            top: 15px;
            border: 1px solid #eef1f5;
            overflow: hidden;
        }
        .panel-tabs {
            display: flex;
            border-bottom: 1px solid #eef1f5;
            background: #fafbfc;
        }
        .panel-tab {
            flex: 1;
            padding: 11px 8px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-light);
            font-family: inherit;
            transition: all 0.2s;
            text-align: center;
            border-bottom: 2px solid transparent;
            pointer-events: auto;
            z-index: 1;
        }
        .panel-tab:hover {
            color: var(--blue);
            background: #f8f9fb;
        }
        .panel-tab.active {
            color: var(--blue);
            border-bottom-color: var(--blue);
            background: white;
        }
        .panel-content {
            padding: 16px;
            max-height: 75vh;
            overflow-y: auto;
        }
        .panel-content.hidden {
            display: none;
        }

        .form-group {
            margin-bottom: 10px;
        }
        .form-group label {
            display: block;
            margin-bottom: 3px;
            font-weight: 600;
            font-size: 10px;
            color: var(--text-light);
            letter-spacing: 0.3px;
        }
        .form-group select,
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 8px 10px;
            border: 2px solid #e8ecf1;
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-family: inherit;
            transition: border-color 0.2s;
            background: #fafbfc;
        }
        .form-group select:focus,
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--blue);
            background: white;
            box-shadow: 0 0 0 3px rgba(0, 119, 190, 0.06);
        }
        .form-group textarea {
            min-height: 50px;
            resize: vertical;
            font-size: 11px;
        }
        .form-row {
            display: flex;
            gap: 10px;
        }
        .form-row .form-group {
            flex: 1;
        }

        .direct-checkbox-row {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #fff8f0;
            border: 1px solid #f0d8a0;
            border-radius: var(--radius-sm);
            padding: 8px 12px;
            margin-bottom: 8px;
            font-size: 11px;
        }
        .direct-checkbox-row input {
            width: auto;
            margin: 0;
        }

        .timeline-section {
            background: var(--light-bg);
            border-radius: var(--radius-sm);
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #dceaf0;
        }
        .timeline-section h4 {
            font-size: 11px;
            color: var(--blue);
            margin-bottom: 10px;
            font-weight: 600;
        }
        .node-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 7px;
            background: white;
            padding: 7px 10px;
            border-radius: var(--radius-sm);
        }
        .node-label {
            font-weight: 600;
            font-size: 10px;
            min-width: 55px;
            color: var(--text);
        }
        .node-date {
            flex: 1;
            padding: 6px 8px;
            border: 2px solid #e8ecf1;
            border-radius: 4px;
            font-size: 10px;
            font-family: inherit;
        }
        .node-date:focus {
            outline: none;
            border-color: var(--blue);
        }

        .btn {
            padding: 9px 16px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .btn-primary {
            background: var(--blue);
            color: white;
            width: 100%;
            margin-top: 4px;
        }
        .btn-primary:hover {
            background: #005a8c;
            box-shadow: 0 3px 12px rgba(0, 119, 190, 0.25);
        }
        .btn-import {
            background: var(--mint);
            color: #1a3a30;
            width: 100%;
            margin-top: 4px;
            font-weight: 600;
        }
        .btn-import:hover {
            background: var(--mint-dark);
            color: white;
        }
        .btn-sm {
            padding: 5px 10px;
            font-size: 10px;
            border-radius: 4px;
            cursor: pointer;
            border: none;
            font-family: inherit;
            font-weight: 600;
        }
        .btn-delete {
            background: #ffe0e0;
            color: var(--red);
        }
        .btn-delete:hover {
            background: var(--red);
            color: white;
        }
        .btn-edit {
            background: #e0edf5;
            color: var(--blue);
        }
        .btn-edit:hover {
            background: var(--blue);
            color: white;
        }
        .btn-export {
            background: #e0f5ec;
            color: var(--green);
        }
        .btn-export:hover {
            background: var(--green);
            color: white;
        }
        .btn-add {
            background: #e0edf5;
            color: var(--blue);
        }
        .btn-add:hover {
            background: var(--blue);
            color: white;
        }
        .btn-toggle {
            background: #e8ecf1;
            color: var(--text-light);
        }
        .btn-copy {
            background: var(--mint);
            color: #1a3a30;
            font-size: 10px;
            padding: 4px 10px;
        }
        .btn-copy:hover {
            background: var(--mint-dark);
            color: white;
        }

        .right-panel {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            flex: 1;
            min-width: 700px;
            border: 1px solid #eef1f5;
            overflow: hidden;
        }
        .right-panel .panel-header {
            padding: 14px 16px;
            border-bottom: 1px solid #eef1f5;
        }
        .right-panel .panel-header h3 {
            font-size: 14px;
            margin-bottom: 10px;
        }
        .filter-bar {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-bar select,
        .filter-bar input {
            padding: 6px 10px;
            border: 2px solid #e8ecf1;
            border-radius: var(--radius-sm);
            font-size: 10px;
            font-family: inherit;
        }
        .table-container {
            overflow-x: auto;
            padding: 0 16px 16px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 10px;
        }
        thead th {
            background: #f8fafb;
            padding: 8px 6px;
            text-align: center;
            font-weight: 700;
            border-bottom: 2px solid #e8ecf1;
            white-space: nowrap;
            position: sticky;
            top: 0;
            color: var(--text-light);
            font-size: 9px;
        }
        tbody td {
            padding: 7px 6px;
            border-bottom: 1px solid #f2f4f6;
            text-align: center;
            vertical-align: middle;
        }
        tbody tr {
            transition: background 0.15s;
        }
        tbody tr:hover {
            background: #f8fafc;
        }
        tbody tr.selected-row {
            background: #e8f4f8 !important;
            outline: 2px solid var(--blue);
            outline-offset: -2px;
        }
        tr.danger-row {
            background: var(--red-bg) !important;
        }
        tr.danger-row:hover {
            background: #ffe0e0 !important;
        }
        tr.warning-row {
            background: var(--yellow-bg) !important;
        }
        tr.warning-row:hover {
            background: #fff8e0 !important;
        }
        tr.done-row {
            background: #f8f9fa !important;
            opacity: 0.65;
        }
        tr.done-row:hover {
            opacity: 0.85;
        }
        tr.paused-row {
            background: #fdf8f2 !important;
            opacity: 0.8;
        }
        tr.terminated-row {
            background: #f5f5f5 !important;
            opacity: 0.5;
            text-decoration: line-through;
            color: #aaa;
        }
        tr.done-collapsed {
            display: none;
        }

        .node-cell {
            display: inline-block;
            padding: 3px 7px;
            border-radius: 10px;
            font-size: 9px;
            font-weight: 700;
            margin: 1px;
            white-space: nowrap;
        }
        .node-danger {
            background: #ffe0e0;
            color: #c0392b;
            border: 1px solid #e8a0a0;
        }
        .node-warning {
            background: #fff8e0;
            color: #856404;
            border: 1px solid #e8d080;
        }
        .node-done {
            background: #e0f5e8;
            color: #155724;
            border: 1px solid #a0d8b0;
        }
        .node-normal {
            background: #f5f5f5;
            color: #666;
            border: 1px solid #ddd;
        }

        .badge {
            display: inline-block;
            padding: 2px 7px;
            border-radius: 10px;
            font-size: 9px;
            font-weight: 600;
        }
        .badge-brand {
            background: #e0edf5;
            color: #0077BE;
        }
        .badge-direct {
            background: #fff0e0;
            color: #e67e22;
        }
        .material-status {
            font-weight: 600;
            font-size: 10px;
        }
        .material-yes {
            color: var(--green);
        }
        .material-no {
            color: var(--red);
        }
        .material-warning {
            color: var(--yellow);
        }
        .express-status {
            font-weight: 600;
            font-size: 10px;
        }
        .express-yes {
            color: var(--green);
        }
        .express-no {
            color: var(--red);
        }
        .express-warning {
            color: var(--yellow);
        }

        .link-icon {
            text-decoration: none;
            font-size: 11px;
            opacity: 0.7;
        }
        .link-icon:hover {
            opacity: 1;
        }
        .group-header td {
            background: #f0f4f8 !important;
            font-weight: 700;
            font-size: 10px;
            color: var(--blue);
            padding: 7px 10px !important;
            border-bottom: 2px solid #d0dce8 !important;
        }
        .empty-state {
            text-align: center;
            padding: 30px;
            color: #c0c8d0;
        }
        .note-cell {
            max-width: 100px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 9px;
            color: #8c9aa8;
            cursor: pointer;
        }
        .note-cell:hover {
            white-space: normal;
            overflow: visible;
            background: #fffde7;
            padding: 3px 5px;
            border-radius: 4px;
            position: relative;
            z-index: 10;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal {
            background: white;
            border-radius: var(--radius);
            padding: 24px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }
        .modal h3 {
            margin-bottom: 14px;
            font-size: 16px;
        }
        .modal textarea {
            width: 100%;
            height: 220px;
            border: 2px solid #e8ecf1;
            border-radius: var(--radius-sm);
            padding: 12px;
            font-size: 12px;
            font-family: inherit;
            resize: vertical;
        }
        .modal textarea:focus {
            outline: none;
            border-color: var(--blue);
        }
        .modal .btn-row {
            display: flex;
            gap: 8px;
            margin-top: 14px;
            justify-content: flex-end;
        }

        .brand-card {
            background: var(--light-bg);
            border-radius: var(--radius-sm);
            padding: 14px;
            margin-bottom: 12px;
            border: 1px solid #dceaf0;
        }
        .brand-card h4 {
            font-size: 13px;
            color: var(--blue);
            margin-bottom: 8px;
        }
        .brand-card .info-row {
            font-size: 11px;
            margin-bottom: 5px;
            color: #3a4a5a;
            display: flex;
            align-items: flex-start;
            gap: 4px;
        }
        .brand-card .info-label {
            font-weight: 600;
            min-width: 45px;
            color: var(--text-light);
            flex-shrink: 0;
        }
        .brand-card textarea {
            width: 100%;
            font-size: 10px;
            font-family: inherit;
            border: 2px solid #e8ecf1;
            border-radius: 4px;
            padding: 6px;
            min-height: 50px;
            resize: vertical;
        }
        .brand-card textarea:focus {
            outline: none;
            border-color: var(--blue);
        }

        .speech-card {
            background: #fafcfd;
            border-radius: var(--radius-sm);
            padding: 14px;
            margin-bottom: 12px;
            border: 1px solid #e8ecf1;
            position: relative;
        }
        .speech-card h4 {
            font-size: 12px;
            margin-bottom: 8px;
            color: var(--text);
        }
        .speech-content {
            background: white;
            padding: 12px;
            border-radius: var(--radius-sm);
            font-size: 11px;
            white-space: pre-wrap;
            line-height: 1.7;
            border: 1px solid #f0f2f5;
            color: #3a4a5a;
        }
        .speech-card .btn-copy {
            position: absolute;
            top: 12px;
            right: 12px;
            z-index: 2;
        }

        .stat-panel {
            background: var(--white);
            padding: 20px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid #eef1f5;
        }
        .stat-panel h3 {
            margin-bottom: 14px;
            font-size: 15px;
        }
        .stat-filters {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            align-items: center;
        }
        .stat-filters select,
        .stat-filters input {
            padding: 7px 10px;
            border: 2px solid #e8ecf1;
            border-radius: var(--radius-sm);
            font-size: 11px;
            font-family: inherit;
        }
        .stat-result {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .stat-result-card {
            background: var(--light-bg);
            padding: 16px 20px;
            border-radius: var(--radius-sm);
            text-align: center;
            min-width: 100px;
        }
        .stat-result-card .big {
            font-size: 28px;
            font-weight: bold;
            color: var(--blue);
        }
        .stat-result-card .small {
            font-size: 10px;
            color: var(--text-light);
        }
        .stat-detail-table {
            width: 100%;
            font-size: 10px;
        }
        .stat-detail-table th {
            background: #f8fafb;
            padding: 6px;
        }
        .stat-detail-table td {
            padding: 5px;
            border-bottom: 1px solid #eee;
        }

        @media (max-width: 900px) {
            .left-panel {
                flex: 0 0 100%;
                position: static;
            }
            .right-panel {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>达人执行进度管理</h1>
                <div class="subtitle">智能导入 · 节点提醒 · 快递素材追踪 · 数据筛查</div>
            </div>
            <div class="header-right" id="todayDisplay">📅</div>
        </div>

        <div class="stats-bar">
            <div class="stat-card total"><div class="number" id="statTotal">0</div><div class="label">总任务数</div></div>
            <div class="stat-card danger"><div class="number" id="statDanger">0</div><div class="label">需处理</div></div>
            <div class="stat-card warning"><div class="number" id="statWarning">0</div><div class="label">即将到期</div></div>
            <div class="stat-card done"><div class="number" id="statDone">0</div><div class="label">已完成</div></div>
        </div>

        <div class="screenshot-reminder" id="screenshotReminder"></div>

        <div class="tabs-nav" id="tabsNav"></div>

        <div class="main-content" id="mainContent">
            <div class="left-panel" id="leftPanel">
                <div class="panel-tabs">
                    <button class="panel-tab active" data-ptab="form" id="panelTabForm">📝 表单</button>
                    <button class="panel-tab" data-ptab="speech" id="panelTabSpeech">💬 话术</button>
                    <button class="panel-tab" data-ptab="brands" id="panelTabBrands">🏷️ 品牌</button>
                </div>
                <div class="panel-content" id="panelForm">
                    <button class="btn btn-import" onclick="showImportModal()">📋 智能导入确认单</button>
                    <div class="form-group" style="margin-top:10px;">
                        <label>📱 达人昵称 *</label>
                        <input type="text" id="nickname" placeholder="输入达人昵称" list="nicknameList">
                        <datalist id="nicknameList"></datalist>
                    </div>
                    <div class="form-row">

    <script>
        // ============ STORAGE ============
        const STORAGE_KEY = 'creator_records_v10';
        const BRAND_INFO_KEY = 'brand_info_v1';

        // ============ GLOBALS ============
        let currentTab = 'urgent';
        let doneCollapsed = true;
        let selectedRecordIndex = -1;

        // ============ UTILS ============
        function getToday() { const t = new Date();
            t.setHours(0, 0, 0, 0); return t; }

        function getTimelineNodes(creatorType) {
            if (creatorType === '图文达人')
                return [{ key: 'outline', label: '大纲' }, { key: 'draft', label: '图文初稿' }, { key: 'publish',
                label: '发布时间' }];
            if (creatorType === '视频达人')
                return [{ key: 'outline', label: '大纲' }, { key: 'script', label: '脚本' }, { key: 'videoDraft',
                    label: '视频初稿' }, { key: 'publish', label: '发布时间' }];
            return [];
        }

        function getRecords() { const d = localStorage.getItem(STORAGE_KEY); return d ? JSON.parse(d) : []; }

        function saveRecords(r) { localStorage.setItem(STORAGE_KEY, JSON.stringify(r)); }

        function getBrandInfo() { const d = localStorage.getItem(BRAND_INFO_KEY); return d ? JSON.parse(d) : {}; }

        function saveBrandInfo(b) { localStorage.setItem(BRAND_INFO_KEY, JSON.stringify(b)); }

        function getNodeStatus(dateStr) {
            if (!dateStr) return 'empty';
            const t = getToday();
            const d = new Date(dateStr);
            d.setHours(0, 0, 0, 0);
            const diff = Math.floor((d - t) / (1000 * 60 * 60 * 24));
            if (diff < 0) return 'danger';
            if (diff <= 1) return 'warning';
            return 'normal';
        }

        function getPublishDate(record) {
            if (record.publishDate) return record.publishDate;
            if (record.timeline && record.timeline['publish'] && record.timeline['publish'].date) return record.timeline[
                'publish'].date;
            return null;
        }

        function isFullyCompleted(record) {
            if (record.coopStatus === '已终止') return false;
            if (record.isDirect) {
                const pubDate = getPublishDate(record);
                if (!pubDate) return false;
                const p = new Date(pubDate);
                p.setHours(0, 0, 0, 0);
                return p <= getToday();
            }
            const pubDate = getPublishDate(record);
            if (!pubDate) return false;
            const p = new Date(pubDate);
            p.setHours(0, 0, 0, 0);
            if (p > getToday()) return false;
            if (record.sentBack !== '是') return false;
            if (!record.trackingNumber || record.trackingNumber.trim() === '') return false;
            if (record.materialReceived !== '是') return false;
            return true;
        }

        function getExpressStatus(record) {
            if (record.isDirect) return 'normal';
            if (record.sentBack === '是' && record.trackingNumber && record.trackingNumber.trim() !== '') return 'done';
            if (record.sentOut !== '是') return 'normal';
            const pubDate = getPublishDate(record);
            if (!pubDate) return 'normal';
            const t = getToday();
            const p = new Date(pubDate);
            p.setHours(0, 0, 0, 0);
            const diff = Math.floor((t - p) / (1000 * 60 * 60 * 24));
            if (diff > 3) return 'danger';
            if (diff >= 0) return 'warning';
            return 'normal';
        }

        function getMaterialStatus(record) {
            if (record.isDirect) return 'normal';
            if (record.materialReceived === '是') return 'done';
            const pubDate = getPublishDate(record);
            if (!pubDate) return 'normal';
            const t = getToday();
            const p = new Date(pubDate);
            p.setHours(0, 0, 0, 0);
            const diff = Math.floor((t - p) / (1000 * 60 * 60 * 24));
            if (diff > 3) return 'danger';
            if (diff >= 0) return 'warning';
            return 'normal';
        }

        function getRecordOverallStatus(record) {
            if (record.coopStatus === '已终止') return 'terminated';
            if (record.coopStatus === '暂停') {
                const today = getToday();
                if (record.pauseEnd) {
                    const pe = new Date(record.pauseEnd);
                    pe.setHours(0, 0, 0, 0);
                    if (today > pe) return 'pause_ending';
                }
                return 'paused';
            }
            if (isFullyCompleted(record)) return 'done';
            const es = getExpressStatus(record),
                ms = getMaterialStatus(record);
            if (es === 'danger' || ms === 'danger') return 'danger';
            if (es === 'warning' || ms === 'warning') return 'warning';
            const nodes = getTimelineNodes(record.creatorType);
            if (record.timeline) {
                for (const n of nodes) {
                    const nd = record.timeline[n.key];
                    if (nd && nd.date && !nd.done && getNodeStatus(nd.date) === 'danger') return 'danger';
                }
                for (const n of nodes) {
                    const nd = record.timeline[n.key];
                    if (nd && nd.date && !nd.done && getNodeStatus(nd.date) === 'warning') return 'warning';
                }
            }
            return 'normal';
        }

        function getSortPriority(record) {
            const status = getRecordOverallStatus(record);
            if (status === 'done') return { g: 4, k: 0 };
            if (status === 'terminated') return { g: 5, k: 0 };
            if (status === 'paused') return { g: 3, k: 0 };
            if (status === 'pause_ending') return { g: 1, k: 0 };
            if (status === 'danger') return { g: 0, k: 0 };
            if (status === 'warning') return { g: 1, k: 1 };
            return { g: 2, k: 2 };
        }

        // ============ TODAY DISPLAY ============
        function updateTodayDisplay() {
            const t = new Date();
            const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            document.getElementById('todayDisplay').textContent =
                '📅 ' + t.getFullYear() + '年' + (t.getMonth() + 1) + '月' + t.getDate() + '日 ' + weekdays[t.getDay()];
        }

        // ============ FORM ============
        function updateTimelineForm() {
            const type = document.getElementById('creatorType').value;
            const container = document.getElementById('timelineNodes');
            const isDirect = document.getElementById('isDirect').checked;
            if (!type) { container.innerHTML =
                '<p style="color:#8c9aa8;font-size:11px;">请先选择达人类型</p>'; return; }
            if (isDirect) {
                container.innerHTML =
                    '<div class="node-row"><span class="node-label">📌 发布时间</span><input type="date" class="node-date" id="node_publish" placeholder="日期"><label style="font-size:10px;display:flex;align-items:center;gap:4px;"><input type="checkbox" id="done_publish" onchange="toggleNodeDone(\'publish\')"> 完成</label></div>';
                return;
            }
            const nodes = getTimelineNodes(type);
            container.innerHTML = nodes.map(n =>
                '<div class="node-row"><span class="node-label">📌 ' + n.label +
                '</span><input type="date" class="node-date" id="node_' + n.key +
                '" placeholder="日期"><label style="font-size:10px;display:flex;align-items:center;gap:4px;"><input type="checkbox" id="done_' +
                n.key + '" onchange="toggleNodeDone(\'' + n.key + '\')"> 完成</label></div>'
                ).join('');
        }

        function toggleNodeDone(key) { const cb = document.getElementById('done_' + key),
                di = document.getElementById('node_' + key); if (di) di.style.opacity = cb.checked ? '0.5' : '1'; }

        function onDirectChange() {
            const isDirect = document.getElementById('isDirect').checked;
            document.getElementById('expressSection').style.display = isDirect ? 'none' : '';
            document.getElementById('materialSection').style.display = isDirect ? 'none' : '';
            updateTimelineForm();
            if (isDirect) {
                document.getElementById('sentOut').value = '否';
                document.getElementById('sentBack').value = '否';
                document.getElementById('trackingNumber').value = '';
                document.getElementById('materialReceived').value = '否';
            }
        }

        function onCoopStatusChange() {
            document.getElementById('pauseDateSection').style.display = document.getElementById('coopStatus').value ===
                '暂停' ? '' : 'none';
        }

        function fillFormFromRecord(r) {
            document.getElementById('nickname').value = r.nickname || '';
            document.getElementById('platform').value = r.platform || '';
            document.getElementById('creatorType').value = r.creatorType || '';
            document.getElementById('isDirect').checked = r.isDirect || false;
            onDirectChange();
            updateTimelineForm();
            setTimeout(function() {
                if (r.timeline)
                    for (const key in r.timeline) {
                        const de = document.getElementById('node_' + key),
                            ce = document.getElementById('done_' + key);
                        if (de) de.value = r.timeline[key].date || '';
                        if (ce) { ce.checked = r.timeline[key].done || false; if (ce.checked && de) de.style
                                .opacity = '0.5'; }
                    }
            }, 100);
            document.getElementById('brand').value = r.brand || '';
            document.getElementById('followers').value = r.followers || '';
            document.getElementById('profileUrl').value = r.profileUrl || '';
            document.getElementById('execPrice').value = r.execPrice || '';
            document.getElementById('publishDate').value = r.publishDate || '';
            document.getElementById('coopStatus').value = r.coopStatus || '正常合作';
            document.getElementById('pauseStart').value = r.pauseStart || '';
            document.getElementById('pauseEnd').value = r.pauseEnd || '';
            onCoopStatusChange();
            document.getElementById('sentOut').value = r.sentOut || '否';
            document.getElementById('sentBack').value = r.sentBack || '否';
            document.getElementById('trackingNumber').value = r.trackingNumber || '';
            document.getElementById('materialReceived').value = r.materialReceived || '否';
            document.getElementById('notes').value = r.notes || '';
        }

        function getTimelineData() {
            const type = document.getElementById('creatorType').value;
            if (!type) return {};
            const isDirect = document.getElementById('isDirect').checked;
            if (isDirect) {
                return { publish: { date: document.getElementById('node_publish')?.value || '', done: document
                            .getElementById('done_publish')?.checked || false } };
            }
            const nodes = getTimelineNodes(type),
                timeline = {};
            nodes.forEach(function(n) { timeline[n.key] = { date: document.getElementById('node_' + n.key)?.value || '',
                    done: document.getElementById('done_' + n.key)?.checked || false }; });
            return timeline;
        }

        // ============ IMPORT MODAL ============
        function showImportModal() {
            document.getElementById('importModal').classList.add('show');
            document.getElementById('importText').focus();
        }

        function closeImportModal() {
            document.getElementById('importModal').classList.remove('show');
            document.getElementById('importText').value = '';
        }

        function parseImport() {
            const text = document.getElementById('importText').value.trim();
            if (!text) { alert('请粘贴确认单内容'); return; }
            const extract = function(p) { const m = text.match(p); return m ? m[1].trim() : ''; };
            const nickname = extract(/合作达人[：:]\s*(.+)/) || extract(/账号[：:]\s*(.+)/) || extract(/达人昵称[：:]\s*(.+)/) ||
                extract(/昵称[：:]\s*(.+)/);
            const platformStr = extract(/需求平台[：:]\s*(.+)/) || extract(/平台[：:]\s*(.+)/);
            const brand = extract(/品牌名称[：:]\s*(.+)/) || extract(/合作产品[：:]\s*(.+)/) || extract(/合作内容[：:]\s*(.+)/) ||
                extract(/品牌[：:]\s*(.+)/);
            const profileUrl = extract(/主页链接[：:]\s*(.+)/) || extract(/抖音链接[：:]\s*(.+)/) || extract(/链接[：:]\s*(.+)/);
            const followers = extract(/粉丝量[：:]\s*(.+)/);
            const execPrice = extract(/执行价[：:]\s*([\d.]+)/) || extract(/执行价[：:]\s*(.+)/);
            const pdMatch = text.match(/发布档期[：:].*?(\d+\.\d+)/) || text.match(/最快发布档期[：:].*?(\d+\.\d+)/) || text
                .match(/合作档期[：:]\s*(\d+\.\d+)/);
            let publishDate = '';
            if (pdMatch) { const parts = pdMatch[1].split('.'); const y = new Date().getFullYear();
                publishDate = y + '-' + parts[0].padStart(2, '0') + '-' + parts[1].padStart(2, '0'); }
            let creatorType = '';
            if (text.match(/视频裸价|报备视频/)) creatorType = '视频达人';
            else if (text.match(/图文裸价|报备图文/)) creatorType = '图文达人';
            let platform = '';
            if (platformStr.includes('小红书')) platform = '小红书';
            else if (platformStr.includes('抖音')) platform = '抖音';
            else if (profileUrl.includes('xiaohongshu') || profileUrl.includes('xhslink')) platform = '小红书';
            else if (profileUrl.includes('douyin')) platform = '抖音';
            const addrMatch = text.match(/收件地址[：:]\s*([\s\S]+?)(?:\n\n|\n[^\s]|$)/);
            let addrInfo = addrMatch ? addrMatch[1].replace(/\n/g, ' ').trim() : '';
            if (addrInfo && addrInfo.length > 200) addrInfo = addrInfo.substring(0, 200);
            const notesMatch = text.match(/【合作须知】([\s\S]+?)$/);
            let notesFromText = notesMatch ? notesMatch[1].trim() : '';
            if (notesFromText && notesFromText.length > 300) notesFromText = notesFromText.substring(0, 300);
            document.getElementById('nickname').value = nickname;
            document.getElementById('platform').value = platform;
            document.getElementById('brand').value = brand;
            document.getElementById('followers').value = followers || '';
            document.getElementById('profileUrl').value = profileUrl || '';
            document.getElementById('execPrice').value = execPrice || '';
            document.getElementById('publishDate').value = publishDate;
            if (creatorType) {
                document.getElementById('creatorType').value = creatorType;
                updateTimelineForm();
                if (publishDate) setTimeout(function() { const pe = document.getElementById('node_publish'); if (pe) pe
                        .value = publishDate; }, 100);
            }
            let fullNotes = '';
            if (addrInfo) fullNotes += '📮收件信息：' + addrInfo + '\n';
            if (notesFromText) fullNotes += '📋合作须知：\n' + notesFromText;
            document.getElementById('notes').value = fullNotes.trim();
            closeImportModal();
            document.getElementById('leftPanel').scrollIntoView({ behavior: 'smooth' });
        }

        // ============ PANEL TABS ============
        function switchPanelTab(ptab) {
            document.querySelectorAll('.panel-tab').forEach(function(b) { b.classList.remove('active'); });
            const targetBtn = document.getElementById('panelTab' + ptab.charAt(0).toUpperCase() + ptab.slice(1));
            if (targetBtn) targetBtn.classList.add('active');
            document.getElementById('panelForm').classList.toggle('hidden', ptab !== 'form');
            document.getElementById('panelSpeech').classList.toggle('hidden', ptab !== 'speech');
            document.getElementById('panelBrands').classList.toggle('hidden', ptab !== 'brands');
            if (ptab === 'speech') updateSpeechFromSelection();
            if (ptab === 'brands') renderBrandCards();
        }

        // ============ TOP TABS ============
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tabs-nav .tab-btn').forEach(function(b) { b.classList.remove('active'); });
            const ab = document.querySelector('.tabs-nav [data-tab="' + tab + '"]');
            if (ab) ab.classList.add('active');
            if (tab === 'stats') {
                document.getElementById('rightPanel').style.display = 'none';
                document.getElementById('statPanel').style.display = 'block';
                document.getElementById('leftPanel').style.display = 'none';
                buildStatFilters();
                runStats();
            } else {
                document.getElementById('rightPanel').style.display = '';
                document.getElementById('statPanel').style.display = 'none';
                document.getElementById('leftPanel').style.display = '';
                renderTable();
            }
            updateScreenshotReminder();
        }

        function renderTabs() {
            const records = getRecords(),
                brands = [...new Set(records.map(function(r) { return r.brand; }))].sort(),
                tabsNav = document.getElementById('tabsNav');
            let html =
                '<button class="tab-btn urgent-tab' + (currentTab === 'urgent' ? ' active' : '') +
                '" data-tab="urgent">🔴 紧急提醒</button>';
            html += '<button class="tab-btn recycle-tab' + (currentTab === 'recycle' ? ' active' : '') +
                '" data-tab="recycle">📦 待回收</button>';
            html += '<button class="tab-btn stat-tab' + (currentTab === 'stats' ? ' active' : '') +
                '" data-tab="stats">📊 数据筛查</button>';
            brands.forEach(function(b) { const c = records.filter(function(r) { return r.brand === b; }).length;
                html += '<button class="tab-btn' + (currentTab === b ? ' active' : '') + '" data-tab="' + b + '">' + b +
                    '<span class="brand-count">' + c + '</span></button>'; });
            tabsNav.innerHTML = html;
            tabsNav.querySelectorAll('.tab-btn').forEach(function(btn) { btn.addEventListener('click', function() {
                    switchTab(this.dataset.tab); }); });
        }

        function toggleDoneRows() { doneCollapsed = !doneCollapsed;
            document.getElementById('btnToggleDone').textContent = doneCollapsed ? '📂 展开已完成/暂停/终止' :
                '📂 折叠已完成/暂停/终止';
            renderTable(); }

        // ============ TABLE ============
        function renderTable() {
            const records = getRecords(),
                tableTitle = document.getElementById('tableTitle');
            const filterPlatform = document.getElementById('filterPlatform').value,
                filterSearch = document.getElementById('filterSearch').value.toLowerCase();
            let filteredRecords = records;
            if (currentTab === 'urgent') { tableTitle.textContent = '📊 紧急提醒 - 全部达人'; } else if (currentTab ===
                'recycle') {
                tableTitle.textContent = '📦 待回收 - 快递 & 素材';
                filteredRecords = records.filter(function(r) {
                    if (r.isDirect) return false;
                    if (r.coopStatus === '已终止') return false;
                    if (isFullyCompleted(r)) return false;
                    const es = getExpressStatus(r),
                        ms = getMaterialStatus(r);
                    return es === 'danger' || es === 'warning' || ms === 'danger' || ms === 'warning';
                });
            } else if (currentTab !== 'stats') {
                filteredRecords = records.filter(function(r) { return r.brand === currentTab; });
                tableTitle.textContent = '📊 ' + currentTab + ' - 执行进度';
            }
            filteredRecords = filteredRecords.filter(function(r) {
                if (filterPlatform && r.platform !== filterPlatform) return false;
                if (filterSearch) {
                    const inName = r.nickname.toLowerCase().includes(filterSearch);
                    const inNotes = (r.notes || '').toLowerCase().includes(filterSearch);
                    const inBrand = (r.brand || '').toLowerCase().includes(filterSearch);
                    if (!inName && !inNotes && !inBrand) return false;
                }
                return true;
            });
            filteredRecords.sort(function(a, b) { const pa = getSortPriority(a),
                    pb = getSortPriority(b); if (pa.g !== pb.g) return pa.g - pb.g; return pa.k - pb.k; });
            const allNodeKeys = new Set();
            filteredRecords.forEach(function(r) { getTimelineNodes(r.creatorType).forEach(function(n) { allNodeKeys.add(n
                        .key); }); });
            const nodeKeys = ['outline', 'script', 'draft', 'videoDraft', 'publish'].filter(function(k) { return allNodeKeys
                    .has(k); });
            const nodeLabels = { 'outline': '大纲', 'script': '脚本', 'draft': '图文初稿', 'videoDraft': '视频初稿',
                'publish': '发布时间' };
            let headHTML = '<tr><th>昵称</th><th>平台</th><th>类型</th><th>品牌</th><th>粉丝</th><th>执行价</th>';
            nodeKeys.forEach(function(k) { headHTML += '<th>' + nodeLabels[k] + '</th>'; });
            headHTML += '<th>寄回</th><th>素材</th><th>备注</th><th>操作</th></tr>';
            document.getElementById('tableHead').innerHTML = headHTML;
            const tbody = document.getElementById('tableBody'),
                colSpan = 6 + nodeKeys.length + 4;
            if (filteredRecords.length === 0) { tbody.innerHTML = '<tr><td colspan="' + colSpan +
                    '" class="empty-state">暂无匹配记录 📝</td></tr>'; } else {
                let html = '',
                    currentGroup = -1;
                filteredRecords.forEach(function(r) {
                    const status = getRecordOverallStatus(r),
                        realIndex = records.indexOf(r),
                        isHidden = doneCollapsed && (status === 'done' || status === 'paused' ||
                            status === 'terminated');
                    if (isHidden) return;
                    let groupLabel = '';
                    if (status === 'danger' && currentGroup !== 0) { groupLabel =
                            '🔴 需要处理 - 超期或快递/素材待回收';
                        currentGroup = 0; } else if ((status === 'warning' || status === 'pause_ending') &&
                        currentGroup !== 1) { groupLabel = '🟡 需要关注 - 即将到期或等待回收';
                        currentGroup = 1; } else if (status === 'normal' && currentGroup !== 2) { groupLabel =
                            '🔵 正常进行中';
                        currentGroup = 2; } else if (status === 'paused' && currentGroup !== 3) { groupLabel =
                            '⏸️ 暂停中';
                        currentGroup = 3; } else if (status === 'done' && currentGroup !== 4) { groupLabel =
                            '✅ 全部完成';
                        currentGroup = 4; } else if (status === 'terminated' && currentGroup !== 5) { groupLabel =
                            '🚫 已终止';
                        currentGroup = 5; }
                    if (groupLabel) html += '<tr class="group-header"><td colspan="' + colSpan + '">' +
                        groupLabel + '</td></tr>';
                    let rowClass = '';
                    if (status === 'danger') rowClass = 'danger-row';
                    else if (status === 'warning' || status === 'pause_ending') rowClass = 'warning-row';
                    else if (status === 'done') rowClass = 'done-row';
                    else if (status === 'paused') rowClass = 'paused-row';
                    else if (status === 'terminated') rowClass = 'terminated-row';
                    let nodeCells = '';
                    nodeKeys.forEach(function(key) {
                        const nd = r.timeline ? r.timeline[key] : null;
                        if (!nd || !nd.date) { nodeCells +=
                            '<td><span style="color:#ccc;">—</span></td>'; } else if (
                            nd.done) { nodeCells +=
                            '<td><span class="node-cell node-done">✅ ' + nd.date +
                            '</span></td>'; } else {
                            const ns = getNodeStatus(nd.date);
                            if (ns === 'danger') { const od = Math.floor((getToday() - new Date(nd
                                    .date)) / (1000 * 60 * 60 * 24));
                                nodeCells +=
                                    '<td><span class="node-cell node-danger">⚠️ ' + nd.date +
                                    ' (超' + od + '天)</span></td>'; } else if (ns === 'warning') { const rd = Math
                                    .floor((new Date(nd.date) - getToday()) / (1000 * 60 * 60 *
                                        24));
                                const label = rd === 0 ? '今天到期' : '明天到期';
                                nodeCells += '<td><span class="node-cell node-warning">⚡ ' + nd.date +
                                    ' (' + label + ')</span></td>'; } else { nodeCells +=
                                    '<td><span class="node-cell node-normal">' + nd.date +
                                    '</span></td>'; }
                        }
                    });
                    let expressBadge = '';
                    if (r.isDirect) { expressBadge = '<span style="color:#ccc;">—</span>'; } else if (r
                        .sentOut === '否') { expressBadge = '<span style="color:#ccc;">未寄</span>'; } else if (
                        r.sentBack === '是' && r.trackingNumber && r.trackingNumber.trim() !== '') {
                        expressBadge = '<span class="express-status express-yes">📬 已回</span>'; } else if (r
                        .sentBack === '是') { expressBadge =
                        '<span class="express-status express-warning">🟡 缺单号</span>'; } else { const es =
                            getExpressStatus(r); if (es === 'danger') expressBadge =
                            '<span class="express-status express-no">🔴 待回收</span>'; else if (es ===
                            'warning') expressBadge =
                            '<span class="express-status express-warning">🟡 待回收</span>';
                        else expressBadge = '📦 已寄'; }
                    let materialBadge = '';
                    if (r.isDirect) { materialBadge = '<span style="color:#ccc;">—</span>'; } else if (r
                        .materialReceived === '是') { materialBadge =
                        '<span class="material-status material-yes">✅ 已给</span>'; } else { const ms =
                            getMaterialStatus(r); if (ms === 'danger') materialBadge =
                            '<span class="material-status material-no">🔴 待给</span>'; else if (ms ===
                            'warning') materialBadge =
                            '<span class="material-status material-warning">🟡 待给</span>';
                        else materialBadge = '<span class="badge badge-brand">未到</span>'; }
                    const noteText = r.notes || '',
                        noteDisplay = noteText.length > 15 ? noteText.substring(0, 15) + '...' : noteText;
                    let typeDisplay = r.creatorType;
                    if (r.isDirect) typeDisplay += ' <span class="badge badge-direct">⚡直发</span>';
                    let pauseInfo = '';
                    if (r.coopStatus === '暂停') {
                        pauseInfo = ' ⏸️';
                        if (r.pauseEnd) pauseInfo += '至' + r.pauseEnd;
                    }
                    const selStyle = realIndex === selectedRecordIndex ?
                        ' style="background:#e8f4f8!important;outline:2px solid var(--blue);outline-offset:-2px;"' :
                        '';
                    html += '<tr class="' + rowClass + '" data-index="' + realIndex + '"' + selStyle +
                        '><td><strong class="clickable-name" onclick="selectRecord(' + realIndex +
                        ')" style="cursor:pointer;color:var(--blue);text-decoration:underline;text-underline-offset:3px;">' +
                        r.nickname + '</strong>' + (r.profileUrl ? ' <a href="' + r.profileUrl +
                            '" target="_blank" class="link-icon">🔗</a>' : '') + pauseInfo + '</td><td>' + r.platform +
                        '</td><td>' + typeDisplay + '</td><td><span class="badge badge-brand">' + r.brand +
                        '</span></td><td>' + (r.followers || '—') + '</td><td>' + (r.execPrice || '—') + '</td>' +
                        nodeCells + '<td>' + expressBadge + '</td><td>' + materialBadge +
                        '</td><td><span class="note-cell" title="' + noteText.replace(/"/g, '&quot;') + '">' + (
                            noteDisplay || '—') +
                        '</span></td><td><button class="btn btn-sm btn-edit" onclick="event.stopPropagation();editRecord(' +
                        realIndex +
                        ')">✏️</button><button class="btn btn-sm btn-delete" onclick="event.stopPropagation();deleteRecord(' +
                        realIndex + ')">🗑️</button></td></tr>';
                });
                if (doneCollapsed) {
                    const hc = filteredRecords.filter(function(r) {
                        const s = getRecordOverallStatus(r); return s === 'done' || s === 'paused' || s ===
                            'terminated';
                    }).length;
                    if (hc > 0) html += '<tr><td colspan="' + colSpan +
                        '" style="text-align:center;color:#8c9aa8;padding:8px;font-size:10px;">📂 已折叠 ' + hc +
                        ' 条已完成/暂停/终止记录</td></tr>';
                }
                tbody.innerHTML = html;
            }
            updateStats(records);
            renderTabs();
            updateDatalists(records);
            updateSpeechFromSelection();
            updateScreenshotReminder();
        }

        function selectRecord(index) {
            selectedRecordIndex = index;
            const r = getRecords()[index];
            if (r) fillFormFromRecord(r);
            updateSpeechFromSelection();
            renderTable();
            switchPanelTab('speech');
            document.getElementById('leftPanel').scrollIntoView({ behavior: 'smooth' });
        }

        function updateStats(records) {
            let dc = 0,
                wc = 0,
                oc = 0;
            records.forEach(function(r) { const s = getRecordOverallStatus(r); if (s === 'danger') dc++; if (s ===
                    'warning' || s === 'pause_ending') wc++; if (s === 'done') oc++; });
            document.getElementById('statTotal').textContent = records.length;
            document.getElementById('statDanger').textContent = dc;
            document.getElementById('statWarning').textContent = wc;
            document.getElementById('statDone').textContent = oc;
        }

        function updateDatalists(records) {
            const nn = [...new Set(records.map(function(r) { return r.nickname; }))].sort(),
                bb = [...new Set(records.map(function(r) { return r.brand; }))].sort();
            document.getElementById('nicknameList').innerHTML = nn.map(function(n) { return '<option value="' + n +
                    '">'; }).join('');
            document.getElementById('brandList').innerHTML = bb.map(function(b) { return '<option value="' + b + '">'; })
                .join('');
        }

        // ============ SPEECH ============
        function updateSpeechFromSelection() {
            let r = null;
            if (selectedRecordIndex >= 0) {
                const records = getRecords();
                if (selectedRecordIndex < records.length) r = records[selectedRecordIndex];
            }
            const isVideo = r && r.creatorType === '视频达人';
            document.getElementById('speechScheduleText').style.display = isVideo ? 'none' : '';
            document.getElementById('speechScheduleVideo').style.display = isVideo ? '' : 'none';
            document.getElementById('speechTypeLabel').textContent = isVideo ? '视频达人' : '图文达人';
            let outlineDate = '',
                draftDate = '',
                scriptDate = '',
                videoDraftDate = '',
                publishDate = '';
            if (r && r.timeline) {
                outlineDate = (r.timeline['outline'] || {}).date || '';
                draftDate = (r.timeline['draft'] || {}).date || '';
                scriptDate = (r.timeline['script'] || {}).date || '';
                videoDraftDate = (r.timeline['videoDraft'] || {}).date || '';
                publishDate = (r.timeline['publish'] || {}).date || '';
            }
            if (r && r.publishDate && !publishDate) publishDate = r.publishDate;
            document.getElementById('speechSchedule').textContent =
                '宝，排期给下哈：\n大纲：' + outlineDate + '\n图文：' + draftDate + '\n发布档期：' + publishDate +
                '\n‼️发布档期当天只能单发品牌一篇笔记\n寄出同步单号~\n‼️‼️未经品牌审核通过，擅自推进拍摄不合格的自行承担重拍后果';
            document.getElementById('speechScheduleVideoContent').textContent =
                '宝，排期给下哈：\n大纲：' + outlineDate + '\n脚本：' + scriptDate + '\n视频初稿：' + videoDraftDate + '\n发布档期：' +
                publishDate + '\n‼️发布档期当天只能单发品牌一篇笔记\n寄出同步单号~\n‼️‼️未经品牌审核通过，擅自推进拍摄不合格的自行承担重拍后果';
            let brandAddr = '';
            if (r) {
                const bi = getBrandInfo();
                if (bi[r.brand] && bi[r.brand].address) brandAddr = bi[r.brand].address;
            }
            document.getElementById('speechReturnContent').textContent =
                '宝子产品辛苦【顺丰到付】寄到这个地址（' + (brandAddr || '【品牌地址】') +
                '）产品各个组件原封放回！！寄出前录下封箱视频丢群里~\n寄出后同步单号哈';
        }

        function copySpeech(type) {
            let text = '';
            if (type === 'schedule') text = document.getElementById('speechSchedule').textContent;
            else if (type === 'scheduleVideo') text = document.getElementById('speechScheduleVideoContent').textContent;
            else if (type === 'return') text = document.getElementById('speechReturnContent').textContent;
            if (!text.trim()) { alert('请先在表格中选择一位达人'); return; }
            navigator.clipboard.writeText(text).then(function() { alert('✅ 已复制到剪贴板，可直接粘贴到群里'); }).catch(
            function() { alert('复制失败，请手动选中文字复制'); });
        }

        // ============ BRAND CARDS ============
        function renderBrandCards() {
            const bi = getBrandInfo();
            const records = getRecords();
            const allBrands = [...new Set([...records.map(function(r) { return r.brand; }), ...Object.keys(bi)])].filter(
                Boolean).sort();
            const container = document.getElementById('brandCardsContainer');
            if (allBrands.length === 0) { container.innerHTML =
                '<p style="color:#8c9aa8;font-size:11px;">暂无品牌数据，保存达人记录后自动生成品牌卡片</p>'; return; }
            let html = '';
            allBrands.forEach(function(brand) {
                const info = bi[brand] || { address: '', notes: '' };

                html += '<div class="brand-card"><h4>🏷️ ' + brand +
                    '</h4><div class="info-row"><span class="info-label">📍寄回地址：</span><span id="brandAddrDisplay_' +
                    brandKey + '">' + (info.address || '未填写') +
                    '</span> <button class="btn btn-sm btn-copy" style="margin-left:6px;" onclick="copyBrandAddress(\'' +
                    brand.replace(/'/g, "\\'") +
                    '\')">📋复制</button></div><div class="form-group" style="margin-top:6px;"><label>⚠️ 审核要点</label><textarea id="brandNotes_' +
                    brandKey + '" onchange="saveBrandNotes(\'' + brand.replace(/'/g, "\\'") + '\')">' + (info.notes ||
                        '') +
                    '</textarea></div><div class="form-group"><label>📍 寄回地址</label><input type="text" id="brandAddr_' +
                    brandKey + '" value="' + (info.address || '') + '" onchange="saveBrandAddr(\'' + brand.replace(/'/g,
